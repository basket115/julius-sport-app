<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Sport App</title>
  <base href="/" />
  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link id="apple-touch-icon" rel="apple-touch-icon" href="/logo.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" id="apple-app-title" content="Sport App" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link id="manifest-link" rel="manifest" href="/manifest.json" />
  <link rel="icon" id="favicon" type="image/png" href="/logo.png" />
  <script>
    (function() {
      const kunde = new URLSearchParams(window.location.search).get('kunde')
                 || localStorage.getItem('kundenId') || '';
      if (!kunde) return;
      // Cookie + localStorage setzen
      localStorage.setItem('kundenId', kunde);
      document.cookie = 'kundenId=' + kunde + '; path=/; max-age=31536000';
      // Manifest-Link sofort mit kunde Parameter setzen
      const ml = document.getElementById('manifest-link');
      if (ml) ml.setAttribute('href', '/manifest.json?kunde=' + kunde);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
